<html>
    <head>
        <title>URL Shortener</title>
        <style>
            body{
                font-family: Arial;
                background: #f4f6f8;
                text-align: center;
                margin-top: 100px;
            }
            .container{
                background: white;
                padding: 40px;
                width: 400px;
                margin: auto;
                border-radius: 10px;
                box-shadow: 0px 5px 20px rgba(0,0,0,0.1)
            }
            input{
                width: 80%;
                padding: 10px;
                margin-top: 15px;
            }
            button{
                padding: 10px 20px;
                margin-top: 10px;
                background: #007BFF;
                color: white;
                border: none;
                border-radius: 5px;
            }
            a{
                color: #007BFF;
            }
        </style>
    </head>
    <body>
        <div class="container">
        <h1>Simple URL Shortener</h1>
        <form action ="/shorten" method = "POST">
            <input type="text" name="url" placeholder="Paste your long URL" required>
            <br>
            <button type="submit">Shorten URL</button>
        </form>
        {% if short_url %}
        <h3>Your Short URL:</h3>
        <input type="text" id="shortLink" value="{{ short_url }}" readonly>
        <br><br>
        <button onclick="copyLink()">Copy</button>
        <br><br>
        <img src = "{{ qr_code}}" width="150">
        {% endif %}
    </div>
    <script>
        function copyLink(){
            var copyText = document.getElementById("shortLink");

            copyText.select();
            copyText.setSelectionRange(0,99999);
            navigator.clipboard.writeText(copyText.value);
            alert("Link copied to clipboard");
        }
    </script>
    </body>
</html>
