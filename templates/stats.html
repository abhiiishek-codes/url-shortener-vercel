<!DOCTYPE html>
<html>
    <head>
        <title>URL Analytics</title>
    </head>
<body>
<h1>URL Analytics</h1>
<table border="1">
<tr>
    <th>Short Code</th>
    <th>Original URL</th>
    <th>Clicks</th>
</tr>

{% for row in rows %}

<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
</tr>

{% endfor %}
</table>

</body>
</html>
